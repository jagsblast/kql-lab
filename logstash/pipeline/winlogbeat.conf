# ──────────────────────────────────────────────────────────────────────────────
# Logstash pipeline: WinLogBeat (Beats) → Kustainer (ADX) streaming ingest
# ──────────────────────────────────────────────────────────────────────────────

input {
  beats {
    port => 5044
    client_inactivity_timeout => 60
  }
}

filter {
  # Drop WinLogBeat internal pipeline/heartbeat events
  if [event][kind] == "pipeline" {
    drop {}
  }
}

output {
  # POST each event as JSON to the relay container.
  # The relay translates events to Kustainer .ingest inline management commands.
  http {
    url                   => "http://relay:9001/ingest"
    http_method           => "post"
    content_type          => "application/json"
    format                => "json"
    automatic_retries     => 3
    retry_failed          => true
    retry_non_idempotent  => true
    pool_max              => 4
    pool_max_per_route    => 2
  }
}
