# ─────────────────────────────────────────────────────────────────────────────
# Bootstrap WinRM on a fresh Windows Server before first run:
#
#   From an elevated PowerShell prompt on the target:
#     Enable-PSRemoting -Force -SkipNetworkProfileCheck
#     winrm set winrm/config/service/auth '@{Ntlm="true"}'
#     netsh advfirewall firewall add rule name="WinRM-HTTP" `
#           protocol=TCP dir=in localport=5985 action=allow
#
# Sensitive values (ansible_password, safe_mode_password, user passwords) are
# stored in group_vars/dc.yml.  Encrypt that file in real environments:
#   ansible-vault encrypt group_vars/dc.yml
# ─────────────────────────────────────────────────────────────────────────────

[dc]
192.168.68.62   # <-- replace with your Windows Server IP

[dc:vars]
ansible_user                       = Administrator
ansible_connection                 = winrm
ansible_winrm_transport            = ntlm
ansible_port                       = 5985
ansible_winrm_server_cert_validation = ignore
